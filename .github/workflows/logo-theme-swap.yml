name: Logo theme swap
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  swap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Swap dark-mode rule and add img dimensions
        run: |
          python3 - << 'PYEOF'
          import glob
          PAIRS = [
              (':root[data-theme="dark"] .logo img { filter: invert(1); }',
               ':root[data-theme="dark"] .logo img { content: url("/lawsuit-informer-1-dark.png"); }'),
              (':root[data-theme="dark"] .logo img { content: url("/logo-informer-dark.png"); }',
               ':root[data-theme="dark"] .logo img { content: url("/lawsuit-informer-1-dark.png"); }'),
              ('<img src="lawsuit-informer-1.png" alt="Lawsuit Informer">',
               '<img src="lawsuit-informer-1.png" alt="Lawsuit Informer" width="703" height="160">'),
              ('<img src="lawsuit-informer-1.png" alt="Lawsuit Informer" />',
               '<img src="lawsuit-informer-1.png" alt="Lawsuit Informer" width="703" height="160" />'),
              ('<img src="/lawsuit-informer-1.png" alt="Lawsuit Informer">',
               '<img src="/lawsuit-informer-1.png" alt="Lawsuit Informer" width="703" height="160">'),
          ]
          changed = 0
          for f in sorted(glob.glob('*.html')):
              h = open(f, encoding='utf-8').read()
              o = h
              for a, b in PAIRS:
                  h = h.replace(a, b)
              if h != o:
                  open(f, 'w', encoding='utf-8').write(h)
                  changed += 1
          print(f"patched {changed} files")
          PYEOF

      - name: Verify
        run: |
          python3 - << 'PYEOF'
          import glob, sys
          left = [f for f in sorted(glob.glob('*.html'))
                  if 'filter: invert(1)' in open(f, encoding='utf-8', errors='ignore').read()]
          if left:
              print("LEFTOVERS:", left)
              sys.exit(1)
          print("clean")
          PYEOF

      - name: Commit and self-delete
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm -q --ignore-unmatch logo-informer.png logo-informer-dark.png
          git rm -q .github/workflows/logo-theme-swap.yml
          git add -A
          git diff --cached --quiet && { echo "nothing to commit"; exit 0; }
          git commit -m "New logo art: dark-asset theme swap, img dimensions, orphan cleanup"
          git push
