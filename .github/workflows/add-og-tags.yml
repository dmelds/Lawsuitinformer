name: Add OG Tags

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (preview only, no commit)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  add-og-tags:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run OG tag injection
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python add_og_tags.py --dry-run
          else
            python add_og_tags.py
          fi

            - name: Commit and push changes
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit (no files were modified)"
            exit 0
          fi
          git add -A
          git commit -m "Add OG + Twitter card meta tags to all pages"
          git pull --rebase origin "$(git branch --show-current)"
          git push
          echo "Pushed changes to $(git branch --show-current)"
