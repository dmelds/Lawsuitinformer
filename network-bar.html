<!-- network-bar.html — IDENTICAL across all four sites.
     Pure markup + styles, no script. The page that fetches this
     handles current-site highlighting. Override --ln-accent per site. -->
<style>
  .ln-bar {
    --ln-accent: #d99a2b; /* per-site amber; change this one line if desired */
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 13px;
    background: #14181f;
    color: #c9ccd1;
    border-bottom: 1px solid rgba(255,255,255,.08);
    width: 100%;
  }
  .ln-bar__inner {
    max-width: 1100px; margin: 0 auto; padding: 7px 16px;
    display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
  }
  .ln-bar a { color: #c9ccd1; text-decoration: none !important; white-space: nowrap; }
  .ln-bar a:hover { color: #fff; }
  .ln-bar__pubs { display: flex; gap: 16px; flex-wrap: wrap; }
  .ln-bar__author { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .ln-bar__divider { width: 1px; height: 14px; background: rgba(255,255,255,.18); }
  .ln-bar a[aria-current="true"] { color: var(--ln-accent); font-weight: 600; cursor: default; }

  @media (max-width: 600px) {
    .ln-bar { font-size: 12px; }
    .ln-bar__inner { padding: 8px 14px; gap: 6px 14px; }
    .ln-bar__pubs { gap: 14px; }
    .ln-bar__author { margin-left: 0; gap: 0; }   /* flows left under the pubs, no right-push */
    .ln-bar__divider { display: none; }            /* removes the orphaned pipe */
  }
</style>

<nav class="ln-bar" aria-label="The Lawsuit Network">
  <div class="ln-bar__inner">
    <div class="ln-bar__pubs">
      <a href="https://lawsuitinformer.com" data-site="lawsuitinformer.com">Lawsuit Informer</a>
      <a href="https://lawsuit.center" data-site="lawsuit.center">Lawsuit Center</a>
      <a href="https://lawsuitintelligencer.com" data-site="lawsuitintelligencer.com">Lawsuit Intelligencer</a>
    </div>
    <div class="ln-bar__author">
      <span class="ln-bar__divider"></span>
      <a href="https://davidmeldofsky.com" data-site="davidmeldofsky.com">By David Meldofsky</a>
    </div>
  </div>
</nav>
